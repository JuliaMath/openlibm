name: CI
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags: '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unix:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
    steps:
      - &git-checkout
        name: Checkout Openlibm
        uses: actions/checkout@v7
      - &count-cpu
        name: Count CPU cores
        uses: ./.github/workflows/composite-nproc
      - &make-build
        name: Build with GNU Make
        run: make -j${CMAKE_BUILD_PARALLEL_LEVEL}
      - &make-test
        name: Test with GNU Make
        run: make test -j${CTEST_PARALLEL_LEVEL}
      - &cmake-build
        name: Build with CMake
        run: cmake -Bbuild && cmake --build build
      - &ctest
        name: Test with CTest
        run: ctest --test-dir build --output-on-failure
  windows:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      CMAKE_GENERATOR: "MinGW Makefiles"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest,  sys: mingw64,     env: x86_64 }
          - { os: windows-latest,  sys: mingw32,     env: i686 }
          - { os: windows-latest,  sys: ucrt64,      env: ucrt-x86_64 }  # Experimental!
          - { os: windows-latest,  sys: clang64,     env: clang-x86_64 } # Experimental!
          - { os: windows-11-arm,  sys: clangarm64,  env: clang-aarch64 } # Experimental!
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - *git-checkout
      - *count-cpu
      - name: Set up the desired MSYS2 environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{matrix.sys}}
          install: base-devel mingw-w64-${{ matrix.env }}-cmake mingw-w64-${{ matrix.env }}-make mingw-w64-${{matrix.env}}-toolchain
      - *make-build
      - *make-test
      - *cmake-build
      - *ctest
  code-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - *git-checkout
      - name: Checkout Openlibm-test
        uses: actions/checkout@v7
        with:
          repository: 'JuliaMath/openlibm-test'
          path: 'openlibm-test'
      - name: Setup LCOV
        uses: hrishikesh-kadam/setup-lcov@v1
      - *count-cpu
      - name: Build Openlibm
        run: make -j${CMAKE_BUILD_PARALLEL_LEVEL} CODE_COVERAGE=1
      - name: Run Test
        run: |
          make -j${CTEST_PARALLEL_LEVEL} -C openlibm-test \
            USE_OPENLIBM=1 OPENLIBM_HOME="$(pwd)" \
            SKIP_FP_EXCEPT_TEST=1
      - name: Show Test Result
        run: cat openlibm-test/src/REPORT
      - name: Gen Coverage Report
        run: make gen-cov-report
      - name: Upload coverage to Codecov
        # Codecov token isn't exposed to forked-PR runs; skip the upload there.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v6
        with:
          files: ./cov-html/libopenlibm.info
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@v7
        with:
          name: code-coverage-report
          path: ./cov-html/
