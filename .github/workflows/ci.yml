name: CI
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags: '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unix:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
    steps:
      - uses: actions/checkout@v7
      - run: make -j$(getconf _NPROCESSORS_ONLN)
      - run: make test
  windows:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest,  sys: mingw64,     env: x86_64 }
          - { os: windows-latest,  sys: mingw32,     env: i686 }
          - { os: windows-latest,  sys: ucrt64,      env: ucrt-x86_64 }  # Experimental!
          - { os: windows-latest,  sys: clang64,     env: clang-x86_64 } # Experimental!
          - { os: windows-11-arm,  sys: clangarm64,  env: clang-aarch64 } # Experimental!
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - name: Set up the desired MSYS2 environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{matrix.sys}}
          install: base-devel mingw-w64-${{matrix.env}}-toolchain
      - run: make -j$(nproc)
      - run: make test
  strict-warnings:
    # Dedicated -Werror lane. Pinned to a fixed image (not ubuntu-latest) so a
    # compiler upgrade surfaces here as an explicit, isolated failure instead of
    # breaking the whole matrix. See WERROR in Make.inc.
    name: strict-werror (${{ matrix.cc }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cc: gcc,   flags: "" }
          - { cc: clang, flags: "USECLANG=1 USEGCC=0" }
    steps:
      - uses: actions/checkout@v7
      - name: Build with -Werror
        run: make -j$(nproc) WERROR=1 ${{ matrix.flags }}
      - name: Test
        run: make test ${{ matrix.flags }}
  code-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Openlibm
        uses: actions/checkout@v7
      - name: Checkout Openlibm-test
        uses: actions/checkout@v7
        with:
          repository: 'JuliaMath/openlibm-test'
          path: 'openlibm-test'
      - name: Setup LCOV
        uses: hrishikesh-kadam/setup-lcov@v1
      - name: Build Openlibm
        run: make -j$(nproc) CODE_COVERAGE=1
      - name: Run Test
        run: |
          make -j$(nproc) -C openlibm-test \
            USE_OPENLIBM=1 OPENLIBM_HOME="$(pwd)" \
            SKIP_FP_EXCEPT_TEST=1
      - name: Show Test Result
        run: cat openlibm-test/src/REPORT
      - name: Gen Coverage Report
        run: make gen-cov-report
      - name: Upload coverage to Codecov
        # Codecov token isn't exposed to forked-PR runs; skip the upload there.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v6
        with:
          files: ./cov-html/libopenlibm.info
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@v7
        with:
          name: code-coverage-report
          path: ./cov-html/
